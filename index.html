<script>
    const workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        renderer: 'zelos',
        grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
    });

    const customBlocks = [];

    function createNewBlock() {
        const name = document.getElementById('blockName').value || 'my_block';
        const color = document.getElementById('blockColor').value;
        const type = 'c_' + name.toLowerCase().replace(/\s+/g, '_') + Date.now();

        Blockly.Blocks[type] = {
            init: function() {
                this.appendDummyInput().appendField(name);
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(color);
            }
        };

        Blockly.JavaScript[type] = function(block) {
            return `/* Logic for ${name} */\n`;
        };

        customBlocks.push({ type, name, color });
        updateToolbox();
        alert('Added to Custom category!');
    }

    function updateToolbox() {
        const toolboxXml = document.getElementById('toolbox');
        const customCat = toolboxXml.querySelector('#customCategory');
        customCat.innerHTML = '';
        customBlocks.forEach(b => {
            const block = document.createElement('block');
            block.setAttribute('type', b.type);
            customCat.appendChild(block);
        });
        workspace.updateToolbox(toolboxXml);
    }

    function generateFullExtension(workspaceCode) {
        return `/*
   This extension was made with Scratch Extension Maker!
*/
(async function(Scratch) {
    const variables = {};
    const blocks = [];
    const menus = {};

    if (!Scratch.extensions.unsandboxed) {
        alert("This extension needs to be unsandboxed to run!");
        return;
    }

    /* Base Sound Engine from Template */
    function doSound(ab, cd, runtime) {
        const audioEngine = runtime.audioEngine;
        const fetchAsArrayBufferWithTimeout = (url) =>
            new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                let timeout = setTimeout(() => { xhr.abort(); reject(new Error("Timed out")); }, 5000);
                xhr.onload = () => {
                    clearTimeout(timeout);
                    if (xhr.status === 200) resolve(xhr.response);
                    else reject(new Error("HTTP error"));
                };
                xhr.onerror = () => { clearTimeout(timeout); reject(new Error("Failed")); };
                xhr.responseType = "arraybuffer";
                xhr.open("GET", url);
                xhr.send();
            });

        const playSound = async (url, target) => {
            try {
                if (!(await Scratch.canFetch(url))) throw new Error("Denied");
                const arrayBuffer = await fetchAsArrayBufferWithTimeout(url);
                const soundPlayer = await audioEngine.decodeSoundPlayer({ data: { buffer: arrayBuffer } });
                const player = soundPlayer.take();
                target.sprite.soundBank.addSoundPlayer(player);
                await target.sprite.soundBank.playSound(target, player.id);
            } catch (e) { console.warn(e); }
        };
        playSound(ab, cd);
    }

    class Extension {
        getInfo() {
            return {
                "id": "generatedExtension",
                "name": "Custom Extension",
                "color1": "#0088ff",
                "color2": "#0063ba",
                "tbShow": true,
                "blocks": [
                    {
                        opcode: "mainBlock",
                        blockType: Scratch.BlockType.COMMAND,
                        text: "run extension blocks",
                        arguments: {}
                    },
                    ${customBlocks.map(b => `{
                        opcode: "${b.type}",
                        blockType: Scratch.BlockType.COMMAND,
                        text: "${b.name}",
                        arguments: {}
                    }`).join(',\n                    ')}
                ],
                "menus": menus
            }
        }
    }

    Extension.prototype["mainBlock"] = async (args, util) => {
        ${workspaceCode}
    };

    ${customBlocks.map(b => `Extension.prototype["${b.type}"] = async (args, util) => {
        console.log("Executed: ${b.name}");
    };`).join('\n\n    ')}

    Scratch.extensions.register(new Extension());
})(Scratch);`;
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-button').forEach(b => {
            b.classList.remove('active');
            if(b.getAttribute('onclick').includes(`'${id}'`)) b.classList.add('active');
        });
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');

        if(id === 'code') {
            const rawCode = Blockly.JavaScript.workspaceToCode(workspace);
            document.getElementById('codeSection').innerText = generateFullExtension(rawCode);
        }
        if(id === 'editor') {
            Blockly.svgResize(workspace);
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('codeSection').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied!");
    }
</script>
