<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scratch Extension Maker</title>
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
  
  <style>
   :root {
  --scratch-blue: #4C97FF;
  --scratch-purple: #9966FF;
  --dark-bg: #111111;
  --panel-bg: #1e1e1e;
  --text-light: #ffffff;
}

body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden; /* Prevents double scrollbars */
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

/* The Top Navigation Bar */
.navbar {
  height: 50px;
  background-color: var(--scratch-blue);
  color: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  z-index: 100;
}

.logo {
  font-weight: bold;
  font-size: 1.2rem;
  letter-spacing: 1px;
}

/* Layout Container */
.main-container {
  display: flex;
  height: calc(100vh - 50px);
  width: 100vw;
}

/* Blockly Workspace Area */
#blocklyDiv {
  flex-grow: 1; /* Takes up remaining space */
  height: 100%;
}

/* The Side Panel for Code Preview */
.code-preview {
  width: 350px;
  background-color: var(--panel-bg);
  border-left: 2px solid #333;
  display: flex;
  flex-direction: column;
}

.code-header {
  background: #333;
  color: var(--scratch-blue);
  padding: 10px;
  font-size: 0.8rem;
  font-weight: bold;
  text-transform: uppercase;
}

#generatedCode {
  flex-grow: 1;
  padding: 15px;
  color: #00FF41; /* "Matrix" green code color */
  font-family: 'Courier New', Courier, monospace;
  font-size: 0.9rem;
  overflow-y: auto;
  white-space: pre-wrap;
  background: var(--dark-bg);
}

/* Export Button Style */
.export-btn {
  background-color: var(--scratch-purple);
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.export-btn:hover {
  background-color: #8555e5;
  transform: scale(1.05);
}
  </style>
</head>
<body>
  <div class="header">My Scratch Extension Maker</div>
  <div id="blocklyDiv"></div>

  <xml id="toolbox" style="display: none">
    <category name="Logic" colour="#5C81A6">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
    </category>
    <category name="Math" colour="#5CA65C">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
    </category>
  </xml>

  <script>
    // 1. Initialize Blockly with the 'Zelos' (Scratch) renderer
    const workspace = Blockly.inject('blocklyDiv', {
      toolbox: document.getElementById('toolbox'),
      renderer: 'zelos',  // This makes it look like Scratch!
      grid: { spacing: 20, length: 3, colour: '#ccc', snap: true },
      zoom: { controls: true, wheel: true }
    });

    // 2. Function to see the code (you can link this to a button later)
    function showCode() {
      const code = Blockly.JavaScript.workspaceToCode(workspace);
      console.log("Generated JavaScript for your Extension:", code);
      alert("Check the console (F12) to see your generated JS!");
    }
  </script>
</body>
</html>
