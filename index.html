<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    
    <style>
        :root {
            --scratch-blue: #4C97FF;
            --dark-bg: #111;
            --tab-inactive: #333;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background: #f9f9f9;
        }

        /* Top Navigation Bar */
        .navbar {
            height: 50px;
            background-color: var(--scratch-blue);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab-button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab-button.active {
            background: white;
            color: var(--scratch-blue);
        }

        .tab-button:hover:not(.active) {
            background: rgba(255,255,255,0.3);
        }

        .copy-btn {
            margin-left: auto;
            background: #9966FF;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* View Content Sections */
        .view-content {
            height: calc(100vh - 50px);
            width: 100%;
            display: none;
        }

        .view-content.active {
            display: block;
        }

        #blocklyDiv {
            height: 100%;
            width: 100%;
        }

        /* Code Preview Styling */
        #codeSection {
            background: var(--dark-bg);
            color: #00FF41;
            padding: 20px;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        #editorSection {
            padding: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button active" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="editor" class="view-content">
        <div id="editorSection">
            <h2>Block Configurator</h2>
            <p>This is where you will define your custom block names and colors.</p>
        </div>
    </div>

    <div id="blocks" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="code" class="view-content">
        <div id="codeSection"></div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Math" colour="#5CA65C">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
    </xml>

    <script>
        // Initialize Blockly
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        // Tab Switching Logic
        function switchTab(tabName) {
            // Update Buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(tabName)) btn.classList.add('active');
            });

            // Update Content
            document.querySelectorAll('.view-content').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');

            // If switching to code tab, update the code
            if(tabName === 'code') {
                const generatedCode = javascriptGenerator.workspaceToCode(workspace);
                document.getElementById('codeSection').innerText = generatedCode || "// Drag some blocks first!";
            }

            // Resize Blockly workspace when returning to it
            if(tabName === 'blocks') {
                Blockly.svgResize(workspace);
            }
        }

        // Copy Logic
        function copyToClipboard() {
            const code = document.getElementById('codeSection').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("Code copied!");
            });
        }

        // Force resize check for reliability
        window.addEventListener('resize', () => Blockly.svgResize(workspace));
    </script>
</body>
</html>
