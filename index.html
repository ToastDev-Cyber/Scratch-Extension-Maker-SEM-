<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scratch Extension Maker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
</head>
<body>
    <div class="header">
        <h1>Scratch Extension Maker</h1>
        <button class="export-btn" onclick="exportExtension()">Download .js Extension</button>
    </div>

    <div id="blocklyDiv"></div>

    <xml id="toolbox" style="display: none">
        <category name="Events" colour="#FFD500">
            <block type="ext_definition"></block>
        </category>
        <category name="Logic" colour="#4C97FF">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Variables" colour="#FF8C1A">
            <block type="math_number"></block>
            <block type="text"></block>
        </category>
    </xml>

    <script src="script.js"></script>
</body>
</html>
