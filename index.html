<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        :root {
            --scratch-blue: #4C97FF;
            --dark-bg: #111;
        }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background: #f9f9f9;
        }
        .navbar {
            height: 50px;
            background-color: var(--scratch-blue);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tab-button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-button.active {
            background: white;
            color: var(--scratch-blue);
        }
        .copy-btn {
            margin-left: auto;
            background: #9966FF;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .view-content {
            height: calc(100vh - 50px);
            width: 100%;
            display: none;
        }
        .view-content.active {
            display: block;
        }
        #blocklyDiv {
            height: 100%;
            width: 100%;
        }
        #codeSection {
            background: var(--dark-bg);
            color: #00FF41;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }
        .config-panel {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .config-panel input {
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .add-block-btn {
            background: var(--scratch-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button active" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="editor" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="blocks" class="view-content">
        <div class="config-panel">
            <h2>Block Configurator</h2>
            <p>Create your custom blocks here.</p>
            <input type="text" id="blockName" placeholder="Block Name">
            <input type="color" id="blockColor" value="#ff6680">
            <br><br>
            <button class="add-block-btn" onclick="createNewBlock()">Add Block</button>
        </div>
    </div>

    <div id="code" class="view-content">
        <div id="codeSection"></div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Math" colour="#5CA65C">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
        <category name="Custom" colour="#FF6680" id="customCategory"></category>
    </xml>

    <script>
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        const customBlocks = [];

        function createNewBlock() {
            const name = document.getElementById('blockName').value || 'my_block';
            const color = document.getElementById('blockColor').value;
            const type = 'c_' + name.toLowerCase().replace(/\s+/g, '_') + Date.now();

            Blockly.Blocks[type] = {
                init: function() {
                    this.appendDummyInput().appendField(name);
                    this.setPreviousStatement(true, null);
                    this.setNextStatement(true, null);
                    this.setColour(color);
                }
            };

            Blockly.JavaScript[type] = function(block) {
                return `console.log("${name}");\n`;
            };

            customBlocks.push(type);
            updateToolbox();
            alert('Added to Custom category!');
        }

        function updateToolbox() {
            const toolboxXml = document.getElementById('toolbox');
            const customCat = toolboxXml.querySelector('#customCategory');
            customCat.innerHTML = '';
            customBlocks.forEach(t => {
                const b = document.createElement('block');
                b.setAttribute('type', t);
                customCat.appendChild(b);
            });
            workspace.updateToolbox(toolboxXml);
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-button').forEach(b => {
                b.classList.remove('active');
                if(b.getAttribute('onclick').includes(`'${id}'`)) b.classList.add('active');
            });
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            if(id === 'code') {
                document.getElementById('codeSection').innerText = Blockly.JavaScript.workspaceToCode(workspace);
            }
            if(id === 'editor') {
                Blockly.svgResize(workspace);
            }
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('codeSection').innerText);
            alert("Copied!");
        }
    </script>
</body>
</html>
