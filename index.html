<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    
    <style>
        :root {
            --scratch-blue: #4C97FF;
            --dark-bg: #111;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background: #f9f9f9;
        }

        /* Navigation */
        .navbar {
            height: 50px;
            background-color: var(--scratch-blue);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
        }

        .tab-button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .tab-button.active {
            background: white;
            color: var(--scratch-blue);
        }

        .copy-btn {
            margin-left: auto;
            background: #9966FF;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* View Content */
        .view-content {
            height: calc(100vh - 50px);
            width: 100%;
            display: none;
        }

        .view-content.active {
            display: block;
        }

        /* The Main Logic Workspace */
        #blocklyDiv { 
            height: 100%; 
            width: 100%; 
        }

        #codeSection {
            background: var(--dark-bg);
            color: #00FF41;
            padding: 20px;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        .padded-info { padding: 20px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button active" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('raw')">Raw</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="editor" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="blocks" class="view-content">
        <div class="padded-info">
            <h2>Blocks Management</h2>
            <p>Use this section to define new block categories or manage your extension metadata.</p>
        </div>
    </div>

    <div id="raw" class="view-content">
        <div class="padded-info">
            <h2>Raw Code Settings</h2>
            <p>Configure how your raw JS blocks interact with the Scratch VM.</p>
        </div>
    </div>

    <div id="code" class="view-content">
        <div id="codeSection"></div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
        </category>
        <category name="Raw Code" colour="#FF661A">
            <block type="raw_command"></block>
            <block type="raw_reporter"></block>
            <block type="raw_boolean"></block>
        </category>
    </xml>

    <script>
        // Define Custom "Raw" Blocks
        Blockly.Blocks['raw_command'] = {
          init: function() {
            this.appendDummyInput()
                .appendField("raw code")
                .appendField(new Blockly.FieldTextInput("console.log('hello world');"), "CODE");
            this.setPreviousStatement(true, null);
            this.setNextStatement(true, null);
            this.setColour("#FF661A");
          }
        };

        Blockly.Blocks['raw_reporter'] = {
          init: function() {
            this.appendDummyInput()
                .appendField("raw value")
                .appendField(new Blockly.FieldTextInput("Math.PI"), "CODE");
            this.setOutput(true, null);
            this.setColour("#FF661A");
          }
        };

        Blockly.Blocks['raw_boolean'] = {
          init: function() {
            this.appendDummyInput()
                .appendField("raw boolean")
                .appendField(new Blockly.FieldTextInput("true"), "CODE");
            this.setOutput(true, "Boolean");
            this.setColour("#FF661A");
          }
        };

        // JS Generators
        javascriptGenerator.forBlock['raw_command'] = function(block) {
          return block.getFieldValue('CODE') + ';\n';
        };
        javascriptGenerator.forBlock['raw_reporter'] = function(block) {
          return [block.getFieldValue('CODE'), javascriptGenerator.ORDER_ATOMIC];
        };
        javascriptGenerator.forBlock['raw_boolean'] = function(block) {
          return [block.getFieldValue('CODE'), javascriptGenerator.ORDER_ATOMIC];
        };

        // Initialize Workspace in the Editor Tab
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        // Tab Management Logic
        function switchTab(tabName) {
            // Update Tab Appearance
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === tabName) btn.classList.add('active');
            });

            // Show/Hide Content
            document.querySelectorAll('.view-content').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');

            // Handle Specific Tab Transitions
            if (tabName === 'code') {
                const code = javascriptGenerator.workspaceToCode(workspace);
                document.getElementById('codeSection').innerText = code || "// No logic blocks found in Editor.";
            }

            if (tabName === 'editor') {
                // Ensure Blockly doesn't break when resizing or showing
                Blockly.svgResize(workspace);
            }
        }

        // Clipboard Helper
        function copyToClipboard() {
            const code = document.getElementById('codeSection').innerText;
            navigator.clipboard.writeText(code).then(() => alert("JavaScript copied to clipboard!"));
        }
    </script>
</body>
</html>
