<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker Pro</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        :root { --scratch-blue: #4C97FF; --dark-bg: #111; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; background: #f9f9f9; }
        .navbar { height: 50px; background-color: var(--scratch-blue); display: flex; align-items: center; padding: 0 10px; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-button { padding: 8px 20px; border: none; border-radius: 5px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; }
        .tab-button.active { background: white; color: var(--scratch-blue); }
        .copy-btn { margin-left: auto; background: #9966FF; color: white; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .view-content { height: calc(100vh - 50px); width: 100%; display: none; }
        .view-content.active { display: block; }
        #blocklyDiv { height: 100%; width: 100%; }
        #codeSection { background: var(--dark-bg); color: #00FF41; padding: 20px; box-sizing: border-box; overflow-y: auto; font-family: 'Courier New', monospace; white-space: pre; height: 100%; margin: 0; }
        .config-panel { padding: 20px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; background: white; height: 90%; overflow-y: auto; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .row { display: flex; align-items: center; gap: 10px; justify-content: center; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .add-block-btn { background: #ff6680; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button active" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="editor" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="blocks" class="view-content">
        <div class="config-panel">
            <h2>Block Designer with Custom Shapes</h2>
            <div class="row">
                <label>Label:</label>
                <input type="text" id="blockName" placeholder="e.g. move [STEPS] steps">
                <label>Color:</label>
                <input type="color" id="blockColor" value="#4C97FF">
            </div>
            <div class="row">
                <label>Shape:</label>
                <select id="blockShape">
                    <option value="COMMAND">Stack (Command)</option>
                    <option value="REPORTER">Rounded (Reporter)</option>
                    <option value="BOOLEAN">Hexagon (Boolean)</option>
                    <option value="HAT">Hat (Event)</option>
                </select>
                <label>Corner Style:</label>
                <select id="blockStyle">
                    <option value="default">Default</option>
                    <option value="square">Square Corners</option>
                    <option value="beveled">Beveled Corners (Integers Style)</option>
                    <option value="rounded">Maximum Rounded</option>
                </select>
            </div>
            <p style="font-size: 0.8em; color: #666;">Use <b>[INPUT_NAME]</b> in the label for inputs.</p>
            <button class="add-block-btn" onclick="createNewBlock()">Create Block & Register Hat Logic</button>
            <hr style="width:100%">
            <div id="history"><h3>Registered Blocks</h3><ul id="blockList"></ul></div>
        </div>
    </div>

    <div id="code" class="view-content">
        <pre id="codeSection"></pre>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6"><block type="controls_if"></block><block type="logic_compare"></block></category>
        <category name="Math" colour="#5CA65C"><block type="math_number"></block><block type="math_arithmetic"></block></category>
        <category name="Custom" colour="#FF6680" id="customCategory"></category>
    </xml>

    <script>
        // 1. Defining a new visual visual styles for Blockly.
        class CustomVisualRenderer extends Blockly.zelos.ConstantProvider {
            constructor() {
                super();
                this.BEVELED_CORNER_RADIUS = 3; 
            }
            
            // This defines how input corner blocks look (the beveled edges in Integers)
            makeNotch() {
                // Return SVG path for beveled corner
                return 'M -1,0 l 1,-1 a 1,1 0 0,1 1,0 l 1,1 a 1,1 0 0,0 1,0 l 1,-1 a 1,1 0 0,1 1,0 l 1,1 z';
            }
        }

        // 2. We overwrite the default constant provider for ZELOS.
        class BeveledZelos extends Blockly.zelos.Renderer {
            makeConstants_() {
                return new CustomVisualRenderer();
            }
        }

        // 3. And register the renderer with Blockly.
        Blockly.registry.register(Blockly.registry.Type.RENDERER, 'beveled_zelos', BeveledZelos);

        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos', // We keep the workspace default.
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        const customBlocks = [];

        function createNewBlock() {
            const rawLabel = document.getElementById('blockName').value || 'my block';
            const color = document.getElementById('blockColor').value;
            const shape = document.getElementById('blockShape').value;
            const style = document.getElementById('blockStyle').value; // Get the custom style.
            const id = 'c_' + rawLabel.toLowerCase().replace(/[^a-z0-9]/g, '_') + Date.now();

            const inputRegex = /\[([^\]]+)\]/g;
            let match;
            const args = [];
            let blocklyLabel = rawLabel;

            while ((match = inputRegex.exec(rawLabel)) !== null) {
                args.push(match[1]);
                blocklyLabel = blocklyLabel.replace(match[0], '%'+args.length);
            }

            Blockly.Blocks[id] = {
                init: function() {
                    const input = this.appendDummyInput().appendField(blocklyLabel);
                    args.forEach((arg, i) => {
                        this.appendValueInput(arg);
                    });
                    if (shape === 'COMMAND') { this.setPreviousStatement(true); this.setNextStatement(true); }
                    if (shape === 'REPORTER') { this.setOutput(true, 'Number'); }
                    if (shape === 'BOOLEAN') { this.setOutput(true, 'Boolean'); }
                    if (shape === 'HAT') { this.setNextStatement(true); }
                    this.setColour(color);
                    
                    // Here we apply the visual style. 
                    // This is VERY advanced Blockly territory.
                    if(style !== 'default'){
                        this.setStyle = function() {
                            // This would require modifying how the view is rendered,
                            // which you can't do in a simple maker tool.
                            console.log("Applying visual style: " + style + " is complex.");
                        };
                    }
                }
            };

            Blockly.JavaScript[id] = function(block) {
                const argCode = args.map(a => Blockly.JavaScript.valueToCode(block, a, Blockly.JavaScript.ORDER_ATOMIC) || "''").join(', ');
                return 'await Extension.prototype["' + id + '"]({ ' + args.map((a,i) => a + ': ' + (argCode.split(',')[i] || "''")).join(', ') + ' }, util);\n';
            };

            customBlocks.push({ id, name: rawLabel, color, shape, args, style }); // Keep track of style.
            updateToolbox();
            document.getElementById('blockList').innerHTML += '<li>' + rawLabel + ' (' + shape + ' - ' + style + ')</li>';
            alert('Block Registered!');
        }

        function updateToolbox() {
            const toolboxXml = document.getElementById('toolbox');
            const customCat = toolboxXml.querySelector('#customCategory');
            customCat.innerHTML = '';
            customBlocks.forEach(b => {
                const blockXml = document.createElement('block');
                blockXml.setAttribute('type', b.id);
                // The issue here is how to apply the visual style to a generic toolbox element.
                // You cannot easily define 'this block is beveled, this block is default'
                // from the toolbox definition.
                customCat.appendChild(blockXml);
            });
            workspace.updateToolbox(toolboxXml);
        }

        // Generate final JS with special styles mentioned.
        function generateFinalJS(innerCode) {
            const blockDefs = customBlocks.map(b => {
                let scratchText = b.name;
                let scratchArgs = {};
                b.args.forEach(arg => {
                    scratchText = scratchText.replace('['+arg+']', '['+arg+']');
                    scratchArgs[arg] = { type: "string", defaultValue: "" };
                });
                return '                    {\n                        opcode: "' + b.id + '",\n                        blockType: Scratch.BlockType.' + b.shape + ',\n                        text: "' + scratchText + '",\n                        arguments: ' + JSON.stringify(scratchArgs) + (b.style === 'beveled' ? ',\n                        isBeveled: true' : '') + '\n                    }';
            }).join(',\n');

            const protoLogic = customBlocks.map(b => {
                return '    Extension.prototype["' + b.id + '"] = async (args, util) => {\n        // Logic for ' + b.name + ' goes here\n        console.log("Executed ' + b.name + '", args);\n    };';
            }).join('\n\n');

            return `(async function(Scratch) {
    const blocks = [];
    if (!Scratch.extensions.unsandboxed) return alert("Unsandboxed mode required");

    // NOTE: For custom block visual styles like 'beveled' edges to work,
    // your extension must modify the renderer of the target editor.
    // This requires VERY advanced Scratch VM knowledge and custom builds.
    
    class Extension {
        getInfo() {
            return {
                id: "customExtension",
                name: "My Extension",
                blocks: [
                    { opcode: "main", blockType: Scratch.BlockType.COMMAND, text: "start logic" },
${blockDefs}
                ]
            };
        }
    }

    Extension.prototype["main"] = async (args, util) => {
${innerCode}
    };

${protoLogic}

    Scratch.extensions.register(new Extension());
})(Scratch);`;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-button').forEach(b => {
                b.classList.remove('active');
                if(b.getAttribute('onclick').includes("'" + id + "'")) b.classList.add('active');
            });
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'code') document.getElementById('codeSection').textContent = generateFinalJS(Blockly.JavaScript.workspaceToCode(workspace));
            if(id === 'editor') Blockly.svgResize(workspace);
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('codeSection').textContent).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
