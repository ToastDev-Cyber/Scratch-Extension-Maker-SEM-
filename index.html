<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker Pro</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        :root { --scratch-blue: #4C97FF; --dark-bg: #111; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; background: #f9f9f9; }
        .navbar { height: 50px; background-color: var(--scratch-blue); display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        .tab-button { padding: 8px 20px; border: none; border-radius: 5px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; }
        .tab-button.active { background: white; color: var(--scratch-blue); }
        .copy-btn { margin-left: auto; background: #9966FF; color: white; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .view-content { height: calc(100vh - 50px); width: 100%; display: none; }
        .view-content.active { display: block; }
        #blocklyDiv { height: 100%; width: 100%; }
        #codeSection { background: var(--dark-bg); color: #00FF41; padding: 20px; box-sizing: border-box; overflow-y: auto; font-family: 'Courier New', monospace; white-space: pre; height: 100%; margin: 0; }
        .config-panel { padding: 20px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; background: white; height: 90%; overflow-y: auto; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;}
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 5px; }
        .add-block-btn { background: var(--scratch-blue); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button active" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="editor" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="blocks" class="view-content">
        <div class="config-panel">
            <h2>Definition & Argument Designer</h2>
            <p>Inputs: <b>[string]</b>, <b>(number)</b>, <b>&lt;boolean&gt;</b>, or <b>()</b></p>
            <input type="text" id="blockName" style="width: 80%;" placeholder="log [message] if <condition>">
            <br>
            <button class="add-block-btn" onclick="createNewBlock()">Spawn Definition & Args</button>
        </div>
    </div>

    <div id="code" class="view-content">
        <pre id="codeSection"></pre>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
            <block type="logic_operation"></block>
            <block type="logic_boolean"></block>
            <block type="ext_return"></block>
        </category>
        <category name="Math" colour="#5CA65C">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
        <category name="Text" colour="#5CA68D">
            <block type="text"></block>
            <block type="text_join"></block>
        </category>
    </xml>

    <script>
        // Stable Return block implementation
        Blockly.Blocks['ext_return'] = {
            init: function() {
                this.appendValueInput("VALUE").appendField("return");
                this.setPreviousStatement(true);
                this.setColour("#FF6680");
            }
        };
        Blockly.JavaScript['ext_return'] = (block) => {
            const val = Blockly.JavaScript.valueToCode(block, 'VALUE', Blockly.JavaScript.ORDER_NONE) || "''";
            return `return ${val};\n`;
        };

        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        const customBlocks = [];

        function createNewBlock() {
            const rawLabel = document.getElementById('blockName').value || 'my block';
            const themeColor = "#9966FF";
            const blockOpcode = 'op_' + Math.random().toString(36).substr(2, 5);

            // Robust Regex for parsing inputs
            const argRegex = /(\[[^\]]+\]|<[^>]+>|\([^)]+\)|\(\))/g;
            let textParts = rawLabel.split(argRegex);
            const args = [];

            // 1. Create the Definition Hat Block
            Blockly.Blocks[blockOpcode] = {
                init: function() {
                    let header = this.appendDummyInput().appendField("define");
                    textParts.forEach(part => {
                        if (!part) return;
                        if (part.match(argRegex)) {
                            // Extract just the label name inside the brackets/parens
                            const labelName = part.replace(/[\[\]<>\(\)]/g, '') || "arg";
                            const type = part.startsWith('<') ? 'boolean' : 'reporter';
                            
                            // Generate a unique ID for the JS args object
                            const argId = labelName.toUpperCase().replace(/\W/g, '_') + "_" + args.length;
                            args.push({ id: argId, label: labelName, type: type });
                            
                            header.appendField(` ${part} `);
                        } else {
                            header.appendField(part);
                        }
                    });
                    this.appendStatementInput("STACK");
                    this.setColour(themeColor);
                }
            };
            Blockly.JavaScript[blockOpcode] = () => '';

            const defBlock = workspace.newBlock(blockOpcode);
            defBlock.initSvg(); defBlock.render();
            defBlock.moveBy(50, 50 + (customBlocks.length * 180));

            // 2. Create the DRAGGABLE Functional Argument Blocks
            args.forEach((arg, index) => {
                const argOp = `arg_${blockOpcode}_${arg.id}`;
                Blockly.Blocks[argOp] = {
                    init: function() {
                        this.appendDummyInput().appendField(arg.label);
                        // Reporter shape for strings/nums, Hexagon for booleans
                        this.setOutput(true, arg.type === 'boolean' ? 'Boolean' : null);
                        this.setColour("#FFAB19"); 
                    }
                };
                
                // Maps the block directly to the JS "args" parameter
                Blockly.JavaScript[argOp] = () => [`args.${arg.id}`, Blockly.JavaScript.ORDER_ATOMIC];
                
                const argBlock = workspace.newBlock(argOp);
                argBlock.initSvg(); argBlock.render();
                argBlock.moveBy(400, 50 + (customBlocks.length * 180) + (index * 45));
            });

            customBlocks.push({ opcode: blockOpcode, name: rawLabel, args: args });
            switchTab('editor');
        }

        function generateFinalJS() {
            const blockDefs = customBlocks.map(b => {
                let sArgs = {};
                b.args.forEach(a => { 
                    sArgs[a.id] = { 
                        type: a.type === 'boolean' ? 'boolean' : 'string', 
                        defaultValue: a.type === 'boolean' ? 'false' : '' 
                    }; 
                });
                
                // Clean text for the final Scratch block menu
                const cleanText = b.name.replace(/[\[\]<>\(\)]/g, '').trim();
                return `                {
                    opcode: "${b.opcode}",
                    blockType: "command",
                    text: "${cleanText}",
                    arguments: ${JSON.stringify(sArgs)}
                }`;
            }).join(',\n');

            const implementations = customBlocks.map(b => {
                const hat = workspace.getAllBlocks(false).find(x => x.type === b.opcode);
                const code = hat ? Blockly.JavaScript.statementToCode(hat, 'STACK') : "";
                return `    Extension.prototype["${b.opcode}"] = async (args, util) => {\n${code}\n    };`;
            }).join('\n\n');

            return `(async function(Scratch) {
    if (!Scratch.extensions.unsandboxed) return;

    class Extension {
        getInfo() {
            return {
                id: "customExt",
                name: "Custom Extension",
                blocks: [\n${blockDefs}\n                ]
            };
        }
    }

${implementations}

    Scratch.extensions.register(new Extension());
})(Scratch);`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'code') document.getElementById('codeSection').textContent = generateFinalJS();
            if(tabId === 'editor') Blockly.svgResize(workspace);
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('codeSection').textContent).then(() => alert("Extension code copied!"));
        }
    </script>
</body>
</html>
