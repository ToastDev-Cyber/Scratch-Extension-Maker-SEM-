<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        :root {
            --scratch-blue: #4C97FF;
            --dark-bg: #111;
        }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: sans-serif;
            overflow: hidden;
            background: #f9f9f9;
        }
        .navbar {
            height: 50px;
            background-color: var(--scratch-blue);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tab-button {
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-button.active {
            background: white;
            color: var(--scratch-blue);
        }
        .copy-btn {
            margin-left: auto;
            background: #9966FF;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .view-content {
            height: calc(100vh - 50px);
            width: 100%;
            display: none;
        }
        .view-content.active {
            display: block;
        }
        #blocklyDiv {
            height: 100%;
            width: 100%;
        }
        #codeSection {
            background: var(--dark-bg);
            color: #00FF41;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }
        .config-panel {
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .config-panel input {
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .add-block-btn {
            background: var(--scratch-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="tab-button active" onclick="switchTab('blocks')">Editor</button>
        <button class="tab-button" onclick="switchTab('editor')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="blocks" class="view-content active">
        <div class="config-panel">
            <h2>Create Custom Block</h2>
            <p>Define your block here, then find it in the "Custom" category in the Blocks tab.</p>
            <input type="text" id="blockName" placeholder="Block Label (e.g. Move Forward)">
            <input type="color" id="blockColor" value="#ffab19">
            <br><br>
            <button class="add-block-btn" onclick="createNewBlock()">Add Block to Toolbox</button>
        </div>
    </div>

    <div id="editor" class="view-content">
        <div id="blocklyDiv"></div>
    </div>

    <div id="code" class="view-content">
        <div id="codeSection"></div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
            <block type="logic_operation"></block>
        </category>
        <category name="Math" colour="#5CA65C">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
        </category>
        <category name="Lists" colour="#745CA6">
            <block type="lists_create_with"></block>
            <block type="lists_length"></block>
        </category>
        <category name="Custom" colour="#FF6680" id="customCategory">
        </category>
    </xml>

    <script>
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        const customBlocks = [];

        function createNewBlock() {
            const name = document.getElementById('blockName').value || 'my_block';
            const color = document.getElementById('blockColor').value;
            const type = 'custom_' + name.toLowerCase().replace(/\s+/g, '_') + Math.floor(Math.random() * 1000);

            Blockly.Blocks[type] = {
                init: function() {
                    this.appendDummyInput().appendField(name);
                    this.setPreviousStatement(true, null);
                    this.setNextStatement(true, null);
                    this.setColour(color);
                }
            };

            Blockly.JavaScript[type] = function(block) {
                return `// Executing custom block: ${name}\n`;
            };

            customBlocks.push(type);
            updateToolbox();
            alert(`Block "${name}" added to the Custom category!`);
        }

        function updateToolbox() {
            const toolbox = document.getElementById('toolbox');
            const customCat = toolbox.querySelector('#customCategory');
            customCat.innerHTML = ''; 
            customBlocks.forEach(type => {
                const block = document.createElement('block');
                block.setAttribute('type', type);
                customCat.appendChild(block);
            });
            workspace.updateToolbox(toolbox);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('onclick').includes(`'${tabId}'`)) btn.classList.add('active');
            });

            document.querySelectorAll('.view-content').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            if(tabId === 'code') {
                const generatedCode = Blockly.JavaScript.workspaceToCode(workspace);
                document.getElementById('codeSection').innerText = generatedCode;
            }
            
            if(tabId === 'editor') {
                Blockly.svgResize(workspace);
            }
        }

        function copyToClipboard() {
            const code = document.getElementById('codeSection').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("Code copied!");
            });
        }
    </script>
</body>
</html>
