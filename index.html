<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scratch Extension Maker Pro</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <style>
        :root { --scratch-blue: #4C97FF; --dark-bg: #111; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; background: #f9f9f9; }
        .navbar { height: 50px; background-color: var(--scratch-blue); display: flex; align-items: center; padding: 0 10px; gap: 10px; }
        .tab-button { padding: 8px 20px; border: none; border-radius: 5px; background: rgba(255,255,255,0.2); color: white; font-weight: bold; cursor: pointer; }
        .tab-button.active { background: white; color: var(--scratch-blue); }
        .settings-btn { background: #FFAB19; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .copy-btn { margin-left: auto; background: #9966FF; color: white; padding: 8px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .view-content { height: calc(100vh - 50px); width: 100%; display: none; }
        .view-content.active { display: block; }
        #blocklyDiv { height: 100%; width: 100%; }
        #codeSection { background: var(--dark-bg); color: #00FF41; padding: 20px; box-sizing: border-box; overflow-y: auto; font-family: 'Courier New', monospace; white-space: pre; height: 100%; margin: 0; }
        .config-panel { padding: 20px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; background: white; height: 90%; overflow-y: auto; border-radius: 10px; margin-top: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;}
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin: 5px; }
        .add-block-btn { background: var(--scratch-blue); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 12px; width: 350px; }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="settings-btn" onclick="toggleModal(true)">⚙️ Settings</button>
        <button class="tab-button active" onclick="switchTab('editor')">Editor</button>
        <button class="tab-button" onclick="switchTab('blocks')">Blocks</button>
        <button class="tab-button" onclick="switchTab('code')">Copy JS</button>
        <button class="copy-btn" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h3>Extension Settings</h3>
            <label>Name:</label><input type="text" id="extName" value="My Extension" style="width:100%"><br>
            <label>ID:</label><input type="text" id="extID" value="myExt" style="width:100%"><br>
            <label>Color:</label><input type="color" id="extColor1" value="#FF6680" style="width:100%"><br>
            <button onclick="toggleModal(false)" style="margin-top:10px; width:100%;">Save</button>
        </div>
    </div>

    <div id="editor" class="view-content active">
        <div id="blocklyDiv"></div>
    </div>

    <div id="blocks" class="view-content">
        <div class="config-panel">
            <h2>Procedure & Arg Designer</h2>
            <p>Inputs like <b>(n)</b> or <b>[s]</b> will create usable reporter blocks.</p>
            <input type="text" id="blockName" style="width: 80%;" placeholder="Example: log [message] to (times) times">
            <br>
            <select id="blockShape">
                <option value="COMMAND">Stack Block</option>
                <option value="REPORTER">Reporter Block</option>
                <option value="BOOLEAN">Boolean Block</option>
            </select>
            <br>
            <button class="add-block-btn" onclick="createNewBlock()">Spawn Definition & Args</button>
        </div>
    </div>

    <div id="code" class="view-content">
        <pre id="codeSection"></pre>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Logic" colour="#5C81A6"><block type="controls_if"></block><block type="logic_compare"></block></category>
        <category name="Math" colour="#5CA65C"><block type="math_number"></block><block type="math_arithmetic"></block></category>
        <category name="Text" colour="#5CA68D"><block type="text"></block></category>
    </xml>

    <script>
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            renderer: 'zelos',
            grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
        });

        const customBlocks = [];

        function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'block' : 'none'; }

        function createNewBlock() {
            const rawLabel = document.getElementById('blockName').value || 'my_function';
            const shape = document.getElementById('blockShape').value;
            const themeColor = document.getElementById('extColor1').value;
            const uniqueId = Math.floor(Math.random()*1000);
            const blockOpcode = 'func_' + uniqueId;

            const patterns = [
                { regex: /\(([^)]+)\)/g, type: 'math_number', name: 'NUM' },
                { regex: /\[([^\]]+)\]/g, type: 'text', name: 'STR' },
                { regex: /<([^>]+)>/g, type: 'logic_boolean', name: 'BOOL' }
            ];

            let displayLabel = rawLabel;
            const args = [];
            
            patterns.forEach(p => {
                displayLabel = displayLabel.replace(p.regex, (match, val) => {
                    const argId = val.replace(/\W/g, '_');
                    args.push({ id: argId, type: p.type, label: val });
                    return '%' + args.length;
                });
            });

            // 1. Create the Main Definition Hat
            Blockly.Blocks[blockOpcode] = {
                init: function() {
                    this.appendDummyInput().appendField("define " + displayLabel);
                    this.appendStatementInput("DO");
                    this.setColour(themeColor);
                }
            };
            Blockly.JavaScript[blockOpcode] = () => '';

            const defBlock = workspace.newBlock(blockOpcode);
            defBlock.initSvg(); defBlock.render();
            defBlock.moveBy(100, 50 + (customBlocks.length * 150));

            // 2. Create usable Argument Blocks (Reporters/Booleans)
            args.forEach((arg, index) => {
                const argBlockType = `arg_${uniqueId}_${arg.id}`;
                Blockly.Blocks[argBlockType] = {
                    init: function() {
                        this.appendDummyInput().appendField(arg.label);
                        if (arg.type === 'logic_boolean') {
                            this.setOutput(true, 'Boolean');
                        } else {
                            this.setOutput(true, null);
                        }
                        this.setColour(themeColor);
                    }
                };
                Blockly.JavaScript[argBlockType] = () => [`args.${arg.id}`, Blockly.JavaScript.ORDER_ATOMIC];

                const argBlock = workspace.newBlock(argBlockType);
                argBlock.initSvg(); argBlock.render();
                argBlock.moveBy(350, 50 + (customBlocks.length * 150) + (index * 40));
            });

            customBlocks.push({ opcode: blockOpcode, name: rawLabel, shape, args });
            switchTab('editor');
        }

        function generateFinalJS() {
            const name = document.getElementById('extName').value;
            const id = document.getElementById('extID').value;
            const c1 = document.getElementById('extColor1').value;

            const blockDefs = customBlocks.map(b => {
                let sArgs = {};
                b.args.forEach(a => {
                    let t = a.type === 'math_number' ? 'number' : (a.type === 'logic_boolean' ? 'boolean' : 'string');
                    sArgs[a.id] = { type: t, defaultValue: '' };
                });
                return `                    {
                        opcode: "${b.opcode}",
                        blockType: Scratch.BlockType.${b.shape},
                        text: "${b.name}",
                        arguments: ${JSON.stringify(sArgs)}
                    }`;
            }).join(',\n');

            const protoLogic = customBlocks.map(b => {
                const hatBlock = workspace.getAllBlocks(false).find(block => block.type === b.opcode);
                const logicCode = hatBlock ? Blockly.JavaScript.statementToCode(hatBlock, 'DO') : "";
                return `    Extension.prototype["${b.opcode}"] = async (args, util) => {
${logicCode}
    };`;
            }).join('\n\n');

            return `(async function(Scratch) {\n    if (!Scratch.extensions.unsandboxed) return;\n    class Extension {\n        getInfo() {\n            return {\n                id: "${id}",\n                name: "${name}",\n                color1: "${c1}",\n                blocks: [\n${blockDefs}\n                ]\n            };\n        }\n    }\n\n${protoLogic}\n\n    Scratch.extensions.register(new Extension());\n})(Scratch);`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.tab-button')).find(b => b.innerText.toLowerCase().includes(tabId));
            if(activeBtn) activeBtn.classList.add('active');
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'code') document.getElementById('codeSection').textContent = generateFinalJS();
            if(tabId === 'editor') Blockly.svgResize(workspace);
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('codeSection').textContent).then(() => alert("Copied!"));
        }
    </script>
</body>
</html>
